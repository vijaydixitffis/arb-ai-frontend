name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_VERSION: ${{ secrets.VITE_API_VERSION || 'v1' }}
          VITE_BACKEND_TYPE: ${{ secrets.VITE_BACKEND_TYPE || 'python' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BRAND_NAME: ${{ secrets.VITE_BRAND_NAME || 'ARB AI Agent' }}
          VITE_BRAND_SHORT_NAME: ${{ secrets.VITE_BRAND_SHORT_NAME || 'ARB' }}
          VITE_BRAND_TAGLINE: ${{ secrets.VITE_BRAND_TAGLINE || 'Architecture Review Board' }}
          VITE_BRAND_DESCRIPTION: ${{ secrets.VITE_BRAND_DESCRIPTION || 'Intelligent Architecture Governance' }}
          VITE_BRAND_LOGO: ${{ secrets.VITE_BRAND_LOGO || '/logo-default.svg' }}
          VITE_BRAND_COLOR: ${{ secrets.VITE_BRAND_COLOR || '#0d9488' }}
          VITE_BRAND_FOOTER: ${{ secrets.VITE_BRAND_FOOTER || '© 2026 ARB AI Agent' }}
        run: npm run build

      - name: Add 404 redirect for client-side routing
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
